<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wake-Up Switch</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <!-- MQTT.js via CDN -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root {
            --bg-color: #020617;
            --panel-bg: rgba(255, 255, 255, 0.03);
            --panel-border: rgba(255, 255, 255, 0.08);
            --primary: #10b981;
            --primary-glow: rgba(16, 185, 129, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, var(--bg-color) 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 40px 24px;
            text-align: center;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-muted);
            font-size: 16px;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .awake-btn {
            background: var(--primary);
            color: #022c22;
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 700;
            border: none;
            border-radius: 50%;
            width: 200px;
            height: 200px;
            cursor: pointer;
            box-shadow: 0 0 40px var(--primary-glow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
        }

        .awake-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0) 50%);
            pointer-events: none;
        }

        .awake-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 60px var(--primary-glow);
        }

        .awake-btn:active {
            transform: scale(0.95);
        }

        .awake-btn.disabled {
            background: #334155;
            color: #94a3b8;
            box-shadow: none;
            cursor: not-allowed;
            transform: scale(1);
        }

        .status {
            margin-top: 30px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            min-height: 20px;
        }

        .success-text {
            color: var(--primary);
            font-size: 18px;
            font-weight: 700;
            margin-top: 20px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
        }

        .success-text.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

<body>

    <div class="container" id="mainCard">
        <h1>Good Morning</h1>
        <p>Tap the button below to turn off the alarm and let me know you're awake.</p>

        <button id="awakeBtn" class="awake-btn">I'M AWAKE</button>

        <div id="successMsg" class="success-text">✨ Signal Sent - Alarm Disabled</div>
        <div id="status" class="status">Connecting to broker...</div>
    </div>

    <script>
        // Configuration
        const MQTT_BROKER = 'wss://broker.emqx.io:8084/mqtt';
        const TOPIC = 'remote-wake-up-4f91bC2-XyZ-1234';

        // Elements
        const btn = document.getElementById('awakeBtn');
        const statusEl = document.getElementById('status');
        const successMsg = document.getElementById('successMsg');

        // Connect to MQTT broker
        let client;
        try {
            client = mqtt.connect(MQTT_BROKER);

            client.on('connect', () => {
                statusEl.textContent = 'Connected. Ready to send signal.';
                statusEl.style.color = '#10b981';
            });

            client.on('error', (err) => {
                statusEl.textContent = 'Connection error. Retrying...';
                statusEl.style.color = '#ef4444';
                console.error('MQTT Error:', err);
            });

            client.on('offline', () => {
                statusEl.textContent = 'Offline. Reconnecting...';
                statusEl.style.color = '#f59e0b';
            });

        } catch (error) {
            statusEl.textContent = 'Failed to initialize connection.';
            statusEl.style.color = '#ef4444';
        }

        // Handle Clicks
        btn.addEventListener('click', () => {
            if (btn.classList.contains('disabled')) return;

            if (client && client.connected) {
                // Publish message
                client.publish(TOPIC, 'awake', { qos: 1 }, (error) => {
                    if (error) {
                        statusEl.textContent = 'Failed to send signal. Tap again.';
                        statusEl.style.color = '#ef4444';
                    } else {
                        // Success State
                        btn.classList.add('disabled');
                        btn.textContent = 'AWAKE';
                        successMsg.classList.add('visible');
                        statusEl.textContent = 'Signal confirmed.';
                        statusEl.style.color = '#64748b';
                    }
                });
            } else {
                statusEl.textContent = 'Not connected to broker. Please wait...';
                statusEl.style.color = '#f59e0b';
            }
        });
    </script>
</body>

</html>
